name: Bot Visual Test RDP

on:
  workflow_dispatch:

jobs:
  test-bot:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright & Dependencies
        run: |
          Write-Host "Initializing Node environment..."
          npm init -y
          npm install playwright
          Write-Host "Installing Chromium browser..."
          npx playwright install chromium

      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          Add-Type -AssemblyName System.Security
          $password = "BotTest@2026!"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Official Latest Tailscale
        run: |
          $tailscaleUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe"
          $tailscaleInstaller = "$env:TEMP\tailscale-setup.exe"
          Invoke-WebRequest -Uri $tailscaleUrl -OutFile $tailscaleInstaller
          Start-Process -FilePath $tailscaleInstaller -ArgumentList "/quiet", "/norestart" -Wait

      - name: Create Desktop Launch Shortcut
        run: |
          # This creates a clickable script on the RDP desktop to launch your bot
          $desktopPath = "C:\Users\Public\Desktop"
          $batFile = "$desktopPath\START_BOT.bat"
          
          echo "@echo off" > $batFile
          echo "cd $env:GITHUB_WORKSPACE" >> $batFile
          echo "echo Injecting Secrets and Starting Bot..." >> $batFile
          echo "set SURFSHARK_MANUAL_USER=${{ secrets.SURFSHARK_MANUAL_USER }}" >> $batFile
          echo "set SURFSHARK_MANUAL_PASS=${{ secrets.SURFSHARK_MANUAL_PASS }}" >> $batFile
          echo "node medicare-bot.js" >> $batFile
          echo "pause" >> $batFile

      - name: Establish Tailscale Connection
        run: |
          $hostName = "gh-runner-$env:GITHUB_RUN_ID"
          echo "TAILSCALE_HOSTNAME=$hostName" >> $env:GITHUB_ENV
          
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --auth-key="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="$hostName"
          
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS CREDENTIALS ==="
          Write-Host "Computer : $env:TAILSCALE_HOSTNAME"
          Write-Host "Username : RDP"
          Write-Host "Password : $env:RDP_PASS"
          Write-Host "==============================`n"
          
          while ($true) { Start-Sleep -Seconds 300 }
