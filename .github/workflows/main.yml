name: Bot Visual Test RDP

on:
  workflow_dispatch:

jobs:
  test-bot:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Public Bot Folder & Dependencies
        shell: cmd
        run: |
          echo Creating public Bot directory...
          mkdir C:\Bot
          
          echo Copying bot script from repository...
          copy "%GITHUB_WORKSPACE%\medicare-bot.js" "C:\Bot\medicare-bot.js"
          
          echo Granting full permissions to all users...
          icacls "C:\Bot" /grant Everyone:(OI)(CI)F /T
          
          echo Initializing Node environment...
          cd /d C:\Bot
          call npm init -y
          call npm install playwright
          
          echo Installing Chromium browser...
          set PLAYWRIGHT_BROWSERS_PATH=C:\pw-browsers
          call npx playwright install chromium

      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          Add-Type -AssemblyName System.Security
          $password = "BotTest@2026!"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Official Latest Tailscale
        run: |
          $tailscaleUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe"
          $tailscaleInstaller = "$env:TEMP\tailscale-setup.exe"
          Invoke-WebRequest -Uri $tailscaleUrl -OutFile $tailscaleInstaller
          Start-Process -FilePath $tailscaleInstaller -ArgumentList "/quiet", "/norestart" -Wait

      - name: Create Desktop Launch Shortcut
        shell: cmd
        run: |
          for /f "delims=" %%I in ('where node') do set NODE_EXE=%%I
          
          echo @echo off > "C:\Users\Public\Desktop\START_BOT.bat"
          echo cd /d "C:\Bot" >> "C:\Users\Public\Desktop\START_BOT.bat"
          echo echo Injecting Secrets and Starting Bot... >> "C:\Users\Public\Desktop\START_BOT.bat"
          echo set "PLAYWRIGHT_BROWSERS_PATH=C:\pw-browsers" >> "C:\Users\Public\Desktop\START_BOT.bat"
          echo set "SURFSHARK_MANUAL_USER=${{ secrets.SURFSHARK_MANUAL_USER }}" >> "C:\Users\Public\Desktop\START_BOT.bat"
          echo set "SURFSHARK_MANUAL_PASS=${{ secrets.SURFSHARK_MANUAL_PASS }}" >> "C:\Users\Public\Desktop\START_BOT.bat"
          echo "%NODE_EXE%" medicare-bot.js >> "C:\Users\Public\Desktop\START_BOT.bat"
          echo pause >> "C:\Users\Public\Desktop\START_BOT.bat"

      - name: Establish Tailscale Connection
        run: |
          $hostName = "gh-runner-$env:GITHUB_RUN_ID"
          echo "TAILSCALE_HOSTNAME=$hostName" >> $env:GITHUB_ENV
          
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --auth-key="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="$hostName"
          
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS CREDENTIALS ==="
          Write-Host "Computer : $env:TAILSCALE_HOSTNAME"
          Write-Host "Username : RDP"
          Write-Host "Password : $env:RDP_PASS"
          Write-Host "==============================`n"
          
          while ($true) { Start-Sleep -Seconds 300 }
